server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Enable CORS for API calls
    add_header Access-Control-Allow-Origin *;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|svg|ico)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }
}
