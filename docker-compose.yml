version: "3.9"

services:

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       store_intel
      POSTGRES_USER:     purplle
      POSTGRES_PASSWORD: purplle_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U purplle"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://purplle:purplle_dev@db:5432/store_intel
      LOG_LEVEL:    INFO
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./events:/app/events
    restart: unless-stopped

  dashboard:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - ./dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
